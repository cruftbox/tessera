[env:tessera]
platform = espressif32
framework = arduino
board = esp32-s3-devkitm-1
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions_16MB_ota.csv
monitor_port = COM7
monitor_speed = 115200
upload_port = COM7
upload_speed = 921600

lib_deps =
  moononournation/GFX Library for Arduino
  links2004/WebSockets @ 2.4.1
  bblanchon/ArduinoJson @ 6.21.5
  lvgl/lvgl @ 8.4.0
  ; TAMC_GT911 is vendored (patched) under lib/TAMC_GT911 — see lib/TAMC_GT911/PATCH.md

build_flags =
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_COLOR_DEPTH=16
  -DARDUINO_USB_CDC_ON_BOOT=0
  -I include

; Wireless upload over the network (ArduinoOTA). Flash the USB env once to land
; OTA-capable firmware, then: platformio.exe run -e tessera_ota -t upload
; Uses the device IP (tessera.local also works where mDNS resolves; on Windows
; that needs Bonjour, so the IP is the reliable default).
[env:tessera_ota]
extends = env:tessera
upload_protocol = espota
upload_port = 192.168.4.117
